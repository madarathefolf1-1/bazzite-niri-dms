name: Build and Sign Custom Bazzite Image
on:
  schedule:
    - cron: '0 0 * * *' # Builds daily to keep up with upstream testing updates
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to trigger the build manually from the UI

env:
  IMAGE_NAME: bazzite-niri-dms
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Install Cosign on the GitHub runner
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      # 2. Log into the GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build and Push the OCI Image using Buildah/Podman Actions
      - name: Build and Push Image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: latest
          containerfiles: ./Containerfile
          oci: true

      - name: Push Image to GHCR
        id: push-image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Sign the published image using your repository secrets
      - name: Sign the Published Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.DIGEST }}"