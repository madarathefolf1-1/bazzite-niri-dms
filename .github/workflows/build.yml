name: Build and Push Custom Bazzite Image
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0' # Rebuilds automatically every Sunday to pull upstream Bazzite testing updates
  workflow_dispatch:

env:
  IMAGE_NAME: bazzite-niri-dms
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OCI Image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: latest
          containerfiles: ./Containerfile

      - name: Push Image to GHCR
        id: push-image
        uses: redhat-actions/push-to-registry@v1
        with:
          image: ${{ steps.build-image.outputs.image-name }}
          tags: ${{ steps.build-image.outputs.image-tags }}
          registry: ${{ env.IMAGE_REGISTRY }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign OCI Image
        run: |
          cosign sign --key env::COSIGN_PRIVATE_KEY "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push-image.outputs.digest }}"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}